<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Yulia Bykova - Wedding Agency</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Songti+TC:wght@400;700&display=swap" rel="stylesheet">
  <!-- Gogol шрифт, через @font-face -->
  <link rel="stylesheet" href="css/style.css">

</head>
<body>

<!-- HERO / Секция 1 -->
<section class="hero">

  <!-- Верхнее меню -->
  <header class="hero__header">
    <div class="menu-left">
      <img src="https://via.placeholder.com/50" alt="Logo" class="logo" onclick="location.reload()">
      <nav class="menu-links-left">
        <a href="#about">ОБО МНЕ</a>
        <a href="#why-me">ПОЧЕМУ Я?</a>
      </nav>
    </div>

    <div class="menu-center">
      <h1 class="hero__name">YULIA BYKOVA</h1>
      <p class="hero__subtitle">ОРГАНИЗАЦИЯ МЕРОПРИЯТИЙ</p>
    </div>

    <div class="menu-right">
      <nav class="menu-links-right">
        <a href="#services">УСЛУГИ</a>
        <a href="#offers">ПРЕДЛОЖЕНИЯ</a>
        <a href="#booking">БРОНЬ</a>
      </nav>
    </div>
  </header>

  <hr class="header-line">

  <!-- Карусель -->
  <div class="carousel-container">
    <button class="carousel-btn prev">&lt;</button>
    <div class="carousel">
      <div class="carousel-track">
        <!-- 10 фотографий -->
        <div class="carousel-item"><img src="https://via.placeholder.com/531x524" alt="Фото 1"></div>
        <div class="carousel-item"><img src="https://via.placeholder.com/531x524" alt="Фото 2"></div>
        <div class="carousel-item"><img src="https://via.placeholder.com/531x524" alt="Фото 3"></div>
        <div class="carousel-item"><img src="https://via.placeholder.com/531x524" alt="Фото 4"></div>
        <div class="carousel-item"><img src="https://via.placeholder.com/531x524" alt="Фото 5"></div>
        <div class="carousel-item"><img src="https://via.placeholder.com/531x524" alt="Фото 6"></div>
        <div class="carousel-item"><img src="https://via.placeholder.com/531x524" alt="Фото 7"></div>
        <div class="carousel-item"><img src="https://via.placeholder.com/531x524" alt="Фото 8"></div>
        <div class="carousel-item"><img src="https://via.placeholder.com/531x524" alt="Фото 9"></div>
        <div class="carousel-item"><img src="https://via.placeholder.com/531x524" alt="Фото 10"></div>
      </div>
    </div>
    <button class="carousel-btn next">&gt;</button>
  </div>

  <!-- Текст под каруселью -->
  <div class="hero-text">
    <p class="line1"><span class="songti">Я ПОМОГУ СДЕЛАТЬ ВАШ ПРАЗДНИК</span> <span class="gogol">незабываемым,</span></p>
    <p class="line2"><span class="songti">ВОПЛОЩАЯ САМЫЕ</span> <span class="gogol">яркие идеи В ЖИЗНЬ.</span></p>
    <a href="#calculate" class="btn-outline">РАССЧИТАТЬ СТОИМОСТЬ</a>
  </div>

</section>

<script src="js/main.js"></script>
</body>
</html>
